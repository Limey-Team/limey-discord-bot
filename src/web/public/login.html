<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Limey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #1a1b1e;
      --bg-tertiary:   #25262b;
      --text-primary:  #e4e5e7;
      --text-secondary:#a6a7ab;
      --text-muted:    #6b6c70;
      --accent:        #5865F2;
      --accent-hover:  #4752c4;
      --border:        #2e2f34;
      --radius:        8px;
      --shadow:        0 2px 12px rgba(0,0,0,0.3);
      --transition:    150ms ease;
    }

    html, body { height: 100%; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .login-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 400px;
      max-width: 90vw;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .login-logo span {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #57F287);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-card h2 { font-size: 18px; margin-bottom: 8px; }
    .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--transition);
    }

    .discord-btn:hover { background: var(--accent-hover); }

    .discord-btn svg { flex-shrink: 0; }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/Limey.png" alt="Limey" style="width:36px;height:36px;object-fit:contain">
      <span>Limey</span>
    </div>

    <h2>Sign in to Dashboard</h2>
    <p>Log in with Discord to access your server logs.</p>

    <a href="/auth/login" class="discord-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Login with Discord
    </a>

    <p class="note">
      You must be the server owner or have Administrator permission in a server where the bot is invited.
    </p>
    <div style="margin-top:24px;display:flex;justify-content:center;gap:16px;font-size:12px">
      <a href="/privacy" style="color:var(--text-muted);text-decoration:none">Privacy Policy</a>
      <a href="/terms" style="color:var(--text-muted);text-decoration:none">Terms of Service</a>
    </div>
  </div>
</body>
</html>
